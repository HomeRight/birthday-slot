<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>映潔生日限定拉霸抽現金</title>
    <!-- 使用 Tailwind CSS 加速開發與響應式設計 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 使用 Canvas-Confetti 製作紙屑特效 -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap');

        body {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Microsoft JhengHei', sans-serif;
            overflow-x: hidden;
            margin: 0;
        }

        .slot-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 2rem;
            border-radius: 2rem;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            border: 8px solid #ffdde1;
            text-align: center;
            max-width: 95%;
            width: 600px;
        }

        .slot-machine-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            background: #333;
            padding: 1.2rem;
            border-radius: 1rem;
            margin: 1.5rem 0;
            border: 4px solid #ffd700;
            box-shadow: inset 0 0 20px #000;
        }

        .reel-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .reel {
            width: 100%;
            height: 100px;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .number-strip {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        .digit {
            height: 100px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            font-weight: bold;
            color: #ff4757;
        }

        .btn-individual {
            background: #ff4757;
            color: white;
            width: 100%;
            padding: 8px 0;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.9rem;
            transition: all 0.2s;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 0px #c0392b;
        }

        .btn-individual:active:not(:disabled) {
            transform: translateY(2px);
            box-shadow: 0 2px 0px #c0392b;
        }

        .btn-individual:disabled {
            background: #999;
            box-shadow: 0 4px 0px #777;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .btn-reset {
            margin-top: 1rem;
            color: #888;
            font-size: 0.9rem;
            text-decoration: underline;
            cursor: pointer;
            background: none;
            border: none;
        }

        .heart-icon {
            color: #ff4757;
            display: inline-block;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .title {
            font-family: 'ZCOOL KuaiLe', cursive;
            color: #ff4757;
            font-size: 2.2rem;
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body>

<div class="slot-container">
    <div class="title">映潔生日幸運拉霸 <span class="heart-icon">❤</span></div>
    <p class="text-gray-600 mb-2">寶貝，一個一個揭曉驚喜吧！</p>
    
    <div class="slot-machine-grid">
        <div class="reel-box">
            <div class="reel"><div class="number-strip" id="strip-0"></div></div>
            <button class="btn-individual" id="btn-0" onclick="spinDigit(0)">抽千位</button>
        </div>
        <div class="reel-box">
            <div class="reel"><div class="number-strip" id="strip-1"></div></div>
            <button class="btn-individual" id="btn-1" onclick="spinDigit(1)">抽百位</button>
        </div>
        <div class="reel-box">
            <div class="reel"><div class="number-strip" id="strip-2"></div></div>
            <button class="btn-individual" id="btn-2" onclick="spinDigit(2)">抽十位</button>
        </div>
        <div class="reel-box">
            <div class="reel"><div class="number-strip" id="strip-3"></div></div>
            <button class="btn-individual" id="btn-3" onclick="spinDigit(3)">抽個位</button>
        </div>
    </div>

    <div id="resultMessage" class="mt-4 text-xl font-bold text-pink-600 opacity-0 transition-opacity duration-500">
        🎉 恭喜獲得現金：$<span id="finalAmount">0</span> 元！ 🎉
    </div>

    <button class="btn-reset" onclick="resetGame()">重新洗牌</button>
</div>

<script>
    const strips = [
        document.getElementById('strip-0'),
        document.getElementById('strip-1'),
        document.getElementById('strip-2'),
        document.getElementById('strip-3')
    ];
    const buttons = [
        document.getElementById('btn-0'),
        document.getElementById('btn-1'),
        document.getElementById('btn-2'),
        document.getElementById('btn-3')
    ];
    const resultMsg = document.getElementById('resultMessage');
    const finalAmountSpan = document.getElementById('finalAmount');
    
    const DIGIT_HEIGHT = 100;
    const REPEAT_COUNT = 40; 
    let finalDigits = [null, null, null, null];
    let isSpinning = [false, false, false, false];

    // 初始化數字列表
    function initStrips() {
        strips.forEach(strip => {
            strip.innerHTML = '';
            for (let i = 0; i < REPEAT_COUNT; i++) {
                for (let j = 0; j <= 9; j++) {
                    const div = document.createElement('div');
                    div.className = 'digit';
                    div.innerText = j;
                    strip.appendChild(div);
                }
            }
            strip.style.transition = 'none';
            strip.style.transform = 'translateY(0px)';
        });
    }

    initStrips();

    function spinDigit(index) {
        if (isSpinning[index] || finalDigits[index] !== null) return;
        
        isSpinning[index] = true;
        buttons[index].disabled = true;
        
        // 隨機決定該位數結果
        const targetDigit = Math.floor(Math.random() * 10);
        finalDigits[index] = targetDigit;

        // 隨機轉動時間 (1.5s - 3s)
        const duration = 1500 + Math.random() * 1500; 
        const extraRounds = 15 + (index * 2); 
        const targetPos = (extraRounds * 10) + targetDigit;
        const moveY = targetPos * DIGIT_HEIGHT;
        
        strips[index].style.transition = `transform ${duration}ms cubic-bezier(0.15, 0, 0.15, 1)`;
        strips[index].style.transform = `translateY(-${moveY}px)`;

        setTimeout(() => {
            isSpinning[index] = false;
            checkGameOver();
        }, duration);
    }

    function checkGameOver() {
        if (finalDigits.every(d => d !== null) && isSpinning.every(s => s === false)) {
            const amount = finalDigits.join('');
            finalAmountSpan.innerText = amount;
            resultMsg.classList.remove('opacity-0');
            
            // 噴發紙屑
            const count = 200;
            const defaults = { origin: { y: 0.7 } };

            function fire(particleRatio, opts) {
                confetti(Object.assign({}, defaults, opts, {
                    particleCount: Math.floor(count * particleRatio)
                }));
            }

            fire(0.25, { spread: 26, startVelocity: 55 });
            fire(0.2, { spread: 60 });
            fire(0.35, { spread: 100, decay: 0.91, scalar: 0.8 });
            fire(0.1, { spread: 120, startVelocity: 25, decay: 0.92, scalar: 1.2 });
            fire(0.1, { spread: 120, startVelocity: 45 });
        }
    }

    function resetGame() {
        finalDigits = [null, null, null, null];
        isSpinning = [false, false, false, false];
        resultMsg.classList.add('opacity-0');
        buttons.forEach(btn => btn.disabled = false);
        initStrips();
    }
</script>

</body>
</html>
