<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>萬用客製化幸運拉霸機</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap');

        body {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Microsoft JhengHei', sans-serif;
            margin: 0;
            padding: 10px;
            overflow-x: hidden;
        }

        .container-box {
            background: rgba(255, 255, 255, 0.95);
            padding: 1.5rem;
            border-radius: 2rem;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            border: 6px solid #ffdde1;
            text-align: center;
            width: 100%;
            max-width: 800px;
        }

        /* 核心：確保所有位數橫向一排 */
        .slot-machine-grid {
            display: flex;
            justify-content: center;
            gap: 4px;
            background: #333;
            padding: 8px;
            border-radius: 1rem;
            margin: 1.5rem 0;
            border: 4px solid #ffd700;
            width: 100%;
        }

        .reel-container {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .reel {
            width: 100%;
            height: 50px;
            background: white;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        @media (min-width: 640px) {
            .reel { height: 80px; }
            .digit { font-size: 2.5rem !important; height: 80px !important; }
        }

        .number-strip {
            position: absolute;
            width: 100%;
            display: flex;
            flex-direction: column;
            transform: translateY(0);
        }

        .digit {
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem; /* 預設小字以適應多位數 */
            font-weight: bold;
            color: #ff4757;
        }

        .btn-individual {
            background: #ff4757;
            color: white;
            width: 100%;
            padding: 5px 0;
            border-radius: 4px;
            font-weight: bold;
            font-size: 10px; /* 手機版極小字 */
            cursor: pointer;
            border: none;
            box-shadow: 0 3px 0 #c0392b;
            white-space: nowrap;
        }

        @media (min-width: 640px) {
            .btn-individual { font-size: 0.8rem; padding: 8px 0; }
        }

        .btn-individual:active:not(:disabled) { transform: translateY(2px); box-shadow: 0 1px 0 #c0392b; }
        .btn-individual:disabled { background: #ccc; box-shadow: 0 3px 0 #999; cursor: not-allowed; opacity: 0.7; }

        .title { font-family: 'ZCOOL KuaiLe', cursive; color: #ff4757; font-size: 1.8rem; }
        
        .result-animation {
            animation: bounceIn 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .config-ui {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            text-align: left;
        }
        
        input, select {
            padding: 0.6rem;
            border: 2px solid #ffdde1;
            border-radius: 0.6rem;
            outline: none;
        }
    </style>
</head>
<body>

<div class="container-box">
    <!-- 設定階段 -->
    <div id="setupView" class="config-ui">
        <h2 class="title text-center">慶生拉霸配置</h2>
        <div class="flex flex-col">
            <label class="text-gray-600 font-bold mb-1">主角名字：</label>
            <input type="text" id="targetName" placeholder="例如：映潔" value="映潔">
        </div>
        <div class="flex flex-col">
            <label class="text-gray-600 font-bold mb-1">金額位數 (1-10)：</label>
            <select id="digitCount" onchange="updateVipVisibility()">
                <!-- JS 動態生成 -->
            </select>
        </div>
        <div id="vipOption" class="flex items-center gap-2">
            <input type="checkbox" id="lockFirstDigit" checked>
            <label for="lockFirstDigit" class="text-pink-600 text-sm font-bold cursor-pointer">首位固定為 1 (保底必中)</label>
        </div>
        <button onclick="enterGame()" class="bg-pink-500 text-white font-bold py-3 rounded-xl hover:bg-pink-600 transition shadow-lg mt-2">進入拉霸模式</button>
    </div>

    <!-- 遊戲階段 -->
    <div id="gameView" class="hidden">
        <div class="title">生日幸運拉霸 ❤</div>
        <p class="text-gray-600 mb-2" id="displaySubtitle"></p>
        
        <div class="slot-machine-grid" id="slotGrid"></div>

        <div id="resultArea" class="hidden mt-4 result-animation">
            <div class="text-xl font-bold text-pink-600 mb-2">
                🎉 恭喜<span id="resName"></span>獲得現金：$<span id="amount">0</span> 元！ 🎉
            </div>
            <div class="text-2xl font-extrabold text-red-500 tracking-widest">🎂 生日快樂 🎂</div>
        </div>

        <button onclick="resetToSetup()" class="mt-8 text-gray-400 underline text-xs">重新設定條件</button>
    </div>
</div>

<script>
    const setupView = document.getElementById('setupView');
    const gameView = document.getElementById('gameView');
    const slotGrid = document.getElementById('slotGrid');
    const digitSelect = document.getElementById('digitCount');
    
    const LABELS = ["十億", "億", "千萬", "百萬", "十萬", "萬", "千", "百", "十", "個"];

    // 初始化選項
    for(let i=1; i<=10; i++) {
        const opt = document.createElement('option');
        opt.value = i;
        opt.innerText = `${i} 位數`;
        if(i === 5) opt.selected = true;
        digitSelect.appendChild(opt);
    }

    let config = { name: "", digits: 5, lockFirst: true };
    let results = [];

    function updateVipVisibility() {
        const count = parseInt(digitSelect.value);
        document.getElementById('vipOption').style.display = (count > 1) ? "flex" : "none";
    }

    function enterGame() {
        config.name = document.getElementById('targetName').value || "主角";
        config.digits = parseInt(digitSelect.value);
        config.lockFirst = document.getElementById('lockFirstDigit').checked && config.digits > 1;
        
        setupView.classList.add('hidden');
        gameView.classList.remove('hidden');
        
        document.getElementById('displaySubtitle').innerText = `${config.name}，抽個大紅包吧！`;
        document.getElementById('resName').innerText = config.name;
        
        initGame();
    }

    function initGame() {
        slotGrid.innerHTML = '';
        results = new Array(config.digits).fill(null);
        document.getElementById('resultArea').classList.add('hidden');
        
        const currentLabels = LABELS.slice(LABELS.length - config.digits);

        for (let i = 0; i < config.digits; i++) {
            const container = document.createElement('div');
            container.className = 'reel-container';
            
            const reel = document.createElement('div');
            reel.className = 'reel';
            
            const strip = document.createElement('div');
            strip.className = 'number-strip';
            strip.id = `strip-${i}`;
            
            // 生成數字
            for (let r = 0; r < 40; r++) {
                for (let d = 0; d <= 9; d++) {
                    const dDiv = document.createElement('div');
                    dDiv.className = 'digit';
                    dDiv.innerText = d;
                    strip.appendChild(dDiv);
                }
            }
            
            const btn = document.createElement('button');
            btn.className = 'btn-individual';
            btn.id = `btn-${i}`;
            btn.innerText = currentLabels[i];
            
            if (i === 0 && config.lockFirst) {
                btn.onclick = () => spinDigit(i, 1);
            } else {
                btn.onclick = () => spinDigit(i);
            }
            
            reel.appendChild(strip);
            container.appendChild(reel);
            container.appendChild(btn);
            slotGrid.appendChild(container);
        }
    }

    function spinDigit(idx, fixedValue = null) {
        if (results[idx] !== null) return;
        
        const btn = document.getElementById(`btn-${idx}`);
        const strip = document.getElementById(`strip-${idx}`);
        const h = document.querySelector('.reel').offsetHeight;
        
        btn.disabled = true;
        const target = (fixedValue !== null) ? fixedValue : Math.floor(Math.random() * 10);
        results[idx] = target;
        
        const move = (300 + target) * h;
        strip.style.transition = 'transform 2.5s cubic-bezier(0.15, 0, 0.15, 1)';
        strip.style.transform = `translateY(-${move}px)`;

        setTimeout(() => checkFinished(), 2600);
    }

    function checkFinished() {
        if (results.every(r => r !== null)) {
            document.getElementById('amount').innerText = Number(results.join('')).toLocaleString();
            document.getElementById('resultArea').classList.remove('hidden');
            
            const end = Date.now() + 3000;
            (function frame() {
                confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#ff4757', '#ffd700'] });
                confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#ff4757', '#ffd700'] });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }
    }

    function resetToSetup() {
        gameView.classList.add('hidden');
        setupView.classList.remove('hidden');
    }
    
    updateVipVisibility();
</script>

</body>
</html>
