<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>萬用客製化幸運拉霸機 Pro + 音效版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap');

        :root {
            --primary-color: #ff4757;
            --bg-gradient: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Microsoft JhengHei', sans-serif;
            margin: 0;
            padding: 10px;
            overflow-x: hidden;
            transition: background 0.5s ease;
        }

        .container-box {
            background: rgba(255, 255, 255, 0.95);
            padding: 1.5rem;
            border-radius: 2rem;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            border: 6px solid #ffdde1;
            text-align: center;
            width: 100%;
            max-width: 800px;
        }

        .slot-machine-grid {
            display: flex;
            justify-content: center;
            gap: 4px;
            background: #222;
            padding: 12px 8px;
            border-radius: 1rem;
            margin: 1rem 0;
            border: 4px solid #ffd700;
            width: 100%;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
        }

        .reel-container {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .reel {
            width: 100%;
            height: 60px;
            background: white;
            border-radius: 6px;
            overflow: hidden;
            position: relative;
            border: 1px solid #ddd;
        }

        @media (min-width: 640px) {
            .reel { height: 100px; }
            .digit { font-size: 3rem !important; height: 100px !important; }
        }

        .number-strip {
            position: absolute;
            width: 100%;
            display: flex;
            flex-direction: column;
            transform: translateY(0);
        }

        .digit {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--primary-color);
            text-shadow: 1px 1px 0px rgba(0,0,0,0.1);
        }

        .btn-individual {
            background: var(--primary-color);
            color: white;
            width: 100%;
            padding: 6px 0;
            border-radius: 6px;
            font-weight: bold;
            font-size: 10px;
            cursor: pointer;
            border: none;
            box-shadow: 0 3px 0 #c0392b;
            transition: all 0.1s;
        }

        .btn-individual:active:not(:disabled) { transform: translateY(2px); box-shadow: 0 1px 0 #c0392b; }
        .btn-individual:disabled { background: #666; box-shadow: 0 3px 0 #444; cursor: not-allowed; opacity: 0.7; }

        .title { font-family: 'ZCOOL KuaiLe', cursive; color: var(--primary-color); font-size: 2rem; }
        
        .config-ui { display: flex; flex-direction: column; gap: 0.8rem; text-align: left; }
        input, select { padding: 0.7rem; border: 2px solid #ffdde1; border-radius: 0.8rem; outline: none; transition: border 0.3s; }
        input:focus { border-color: var(--primary-color); }

        .is-spinning {
            animation: blurText 0.1s infinite alternate;
        }
        @keyframes blurText {
            from { filter: blur(0px); }
            to { filter: blur(2px); }
        }

        .main-action-btn {
            background: #27ae60;
            color: white;
            font-weight: 900;
            padding: 1rem;
            border-radius: 1rem;
            width: 100%;
            font-size: 1.2rem;
            margin-top: 10px;
            box-shadow: 0 5px 0 #1e8449;
        }
        .main-action-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #1e8449; }
        .main-action-btn.stop { background: #e67e22; box-shadow: 0 5px 0 #d35400; }

        .history-section {
            margin-top: 2rem;
            text-align: left;
            border-top: 2px dashed #ffdde1;
            padding-top: 1rem;
        }
        .history-item {
            background: rgba(255, 255, 255, 0.6);
            border-radius: 0.5rem;
            padding: 0.5rem 1rem;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            border: 1px solid #fff;
        }
    </style>
</head>
<body>

<div class="container-box">
    <!-- 設定階段 -->
    <div id="setupView" class="config-ui">
        <h2 class="title text-center">🎰 萬用拉霸配置</h2>
        <div class="grid grid-cols-2 gap-3">
            <div class="flex flex-col">
                <label class="text-gray-600 font-bold mb-1">主題：</label>
                <input type="text" id="eventTopic" value="生日">
            </div>
            <div class="flex flex-col">
                <label class="text-gray-600 font-bold mb-1">對象：</label>
                <input type="text" id="targetName" value="映潔">
            </div>
        </div>
        <div class="grid grid-cols-2 gap-3">
            <div class="flex flex-col">
                <label class="text-gray-600 font-bold mb-1">位數：</label>
                <select id="digitCount" onchange="updateVipVisibility()"></select>
            </div>
            <div class="flex flex-col">
                <label class="text-gray-600 font-bold mb-1">單位：</label>
                <input type="text" id="unitName" value="元">
            </div>
        </div>
        <div id="vipOption" class="flex items-center gap-2 bg-pink-50 p-2 rounded-lg">
            <input type="checkbox" id="lockFirstDigit" checked>
            <label for="lockFirstDigit" class="text-pink-600 text-sm font-bold cursor-pointer">首位保底 (固定為 1)</label>
        </div>
        <button onclick="enterGame()" class="bg-pink-500 text-white font-bold py-4 rounded-2xl hover:bg-pink-600 transition shadow-xl mt-2 text-lg">設定完成，開始抽獎！</button>
    </div>

    <!-- 遊戲階段 -->
    <div id="gameView" class="hidden">
        <div class="title" id="mainTitleDisplay">幸運拉霸 ❤</div>
        <p class="text-gray-600 mb-2" id="displaySubtitle"></p>
        
        <div class="slot-machine-grid" id="slotGrid"></div>

        <button id="masterBtn" onclick="toggleMasterSpin()" class="main-action-btn">一鍵全部開始</button>

        <div id="resultArea" class="hidden mt-4 p-4 bg-yellow-50 rounded-2xl border-2 border-yellow-200">
            <div class="text-xl font-bold text-pink-600 mb-1">
                🎉 恭喜<span id="resName"></span>獲得<span id="resTopic"></span>：
            </div>
            <div class="text-3xl font-black text-red-500 my-2">
                <span id="amount">0</span> <span class="resUnit">元</span>
            </div>
            <div class="text-xl font-bold text-orange-500" id="finalWishes"></div>
            <button onclick="initGame()" class="mt-2 text-blue-500 text-sm font-bold">再抽一次</button>
        </div>

        <!-- 歷史紀錄區 -->
        <div class="history-section">
            <div class="flex justify-between items-center mb-2">
                <h3 class="font-bold text-gray-500">📜 抽獎紀錄</h3>
                <button id="clearBtn" onclick="handleClearHistory()" class="text-xs text-gray-400 bg-gray-100 px-2 py-1 rounded hover:bg-red-100 hover:text-red-500 transition-all">清空紀錄</button>
            </div>
            <div id="historyList">
                <p class="text-center text-gray-400 text-xs py-4">目前尚無紀錄</p>
            </div>
        </div>

        <button onclick="resetToSetup()" class="mt-6 text-gray-400 underline text-xs">返回修改設定</button>
    </div>
</div>

<script>
    // --- 音效引擎 (Web Audio API) ---
    const AudioEngine = {
        ctx: null,
        init() {
            if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        },
        // 短促滴答聲 (轉動時)
        playTick() {
            this.init();
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800, this.ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(100, this.ctx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.1);
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            osc.start();
            osc.stop(this.ctx.currentTime + 0.1);
        },
        // 敲擊聲 (停止時)
        playStop() {
            this.init();
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(400, this.ctx.currentTime);
            gain.gain.setValueAtTime(0.2, this.ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.3);
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            osc.start();
            osc.stop(this.ctx.currentTime + 0.3);
        },
        // 中獎琶音 (結算時)
        playWin() {
            this.init();
            const notes = [523.25, 659.25, 783.99, 1046.50]; // C5, E5, G5, C6
            notes.forEach((freq, i) => {
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, this.ctx.currentTime + i * 0.1);
                gain.gain.setValueAtTime(0.1, this.ctx.currentTime + i * 0.1);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + i * 0.1 + 0.4);
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start(this.ctx.currentTime + i * 0.1);
                osc.stop(this.ctx.currentTime + i * 0.1 + 0.4);
            });
        }
    };

    const setupView = document.getElementById('setupView');
    const gameView = document.getElementById('gameView');
    const slotGrid = document.getElementById('slotGrid');
    const digitSelect = document.getElementById('digitCount');
    const masterBtn = document.getElementById('masterBtn');
    const historyList = document.getElementById('historyList');
    const clearBtn = document.getElementById('clearBtn');
    
    const LABELS = ["十億", "億", "千萬", "百萬", "十萬", "萬", "千", "百", "十", "個"];
    let config = { topic: "", name: "", unit: "", digits: 5, lockFirst: true };
    let results = [];
    let isMasterSpinning = false;
    let historyData = [];
    let isProcessingResult = false; 
    let clearConfirmMode = false;

    // 初始化下拉
    for(let i=1; i<=10; i++) {
        const opt = document.createElement('option');
        opt.value = i; opt.innerText = `${i} 位數`;
        if(i === 5) opt.selected = true;
        digitSelect.appendChild(opt);
    }

    function updateVipVisibility() {
        document.getElementById('vipOption').style.display = (parseInt(digitSelect.value) > 1) ? "flex" : "none";
    }

    function enterGame() {
        AudioEngine.init(); // 啟動音效上下文
        config.topic = document.getElementById('eventTopic').value || "活動";
        config.name = document.getElementById('targetName').value || "主角";
        config.unit = document.getElementById('unitName').value || "元";
        config.digits = parseInt(digitSelect.value);
        config.lockFirst = document.getElementById('lockFirstDigit').checked && config.digits > 1;
        
        setupView.classList.add('hidden');
        gameView.classList.remove('hidden');
        
        document.getElementById('mainTitleDisplay').innerText = `${config.topic}幸運拉霸 ❤`;
        document.getElementById('displaySubtitle').innerText = `祝 ${config.name} ${config.topic}快樂！`;
        document.getElementById('resName').innerText = config.name;
        document.getElementById('resTopic').innerText = config.topic + "獎項";
        document.querySelectorAll('.resUnit').forEach(el => el.innerText = config.unit);
        document.getElementById('finalWishes').innerText = `✨ ${config.topic}大吉 ✨`;
        
        initGame();
    }

    function initGame() {
        slotGrid.innerHTML = '';
        results = new Array(config.digits).fill(null);
        isMasterSpinning = false;
        isProcessingResult = false; 
        masterBtn.innerText = "一鍵全部開始";
        masterBtn.className = "main-action-btn";
        masterBtn.disabled = false;
        masterBtn.style.display = 'block';
        document.getElementById('resultArea').classList.add('hidden');
        
        const currentLabels = LABELS.slice(LABELS.length - config.digits);

        for (let i = 0; i < config.digits; i++) {
            const container = document.createElement('div');
            container.className = 'reel-container';
            
            const reel = document.createElement('div');
            reel.className = 'reel';
            const strip = document.createElement('div');
            strip.className = 'number-strip';
            strip.id = `strip-${i}`;
            
            for (let r = 0; r < 40; r++) {
                for (let d = 0; d <= 9; d++) {
                    const dDiv = document.createElement('div');
                    dDiv.className = 'digit';
                    dDiv.innerText = d;
                    strip.appendChild(dDiv);
                }
            }
            
            const btn = document.createElement('button');
            btn.className = 'btn-individual';
            btn.id = `btn-${i}`;
            btn.innerText = currentLabels[i];
            btn.onclick = () => spinDigit(i, (i===0 && config.lockFirst) ? 1 : null);
            
            reel.appendChild(strip);
            container.appendChild(reel);
            container.appendChild(btn);
            slotGrid.appendChild(container);
        }
    }

    function toggleMasterSpin() {
        AudioEngine.playTick();
        if (!isMasterSpinning) {
            isMasterSpinning = true;
            masterBtn.innerText = "全部停止！";
            masterBtn.classList.add('stop');
            
            for (let i = 0; i < config.digits; i++) {
                const strip = document.getElementById(`strip-${i}`);
                strip.classList.add('is-spinning');
                strip.style.transition = 'transform 0.5s linear';
                strip.style.transform = `translateY(-${20 * getReelHeight()}px)`;
                
                strip.ontransitionend = () => {
                    if (results[i] === null) {
                        AudioEngine.playTick(); // 每轉一圈響一次
                        strip.style.transition = 'none';
                        strip.style.transform = 'translateY(0)';
                        setTimeout(() => {
                            strip.style.transition = 'transform 0.5s linear';
                            strip.style.transform = `translateY(-${20 * getReelHeight()}px)`;
                        }, 10);
                    }
                };
            }
        } else {
            isMasterSpinning = false;
            masterBtn.disabled = true;
            stopSequentially(0);
        }
    }

    function stopSequentially(idx) {
        if (idx >= config.digits) return;
        spinDigit(idx, (idx===0 && config.lockFirst) ? 1 : null);
        setTimeout(() => stopSequentially(idx + 1), 300);
    }

    function getReelHeight() {
        return document.querySelector('.reel').offsetHeight;
    }

    function spinDigit(idx, fixedValue = null) {
        if (results[idx] !== null && !isMasterSpinning) return;
        
        const btn = document.getElementById(`btn-${idx}`);
        const strip = document.getElementById(`strip-${idx}`);
        const h = getReelHeight();
        
        btn.disabled = true;
        const target = (fixedValue !== null) ? fixedValue : Math.floor(Math.random() * 10);
        results[idx] = target;
        
        strip.classList.remove('is-spinning');
        strip.ontransitionend = null;
        
        const move = (350 + target) * h;
        strip.style.transition = 'transform 2s cubic-bezier(0.15, 0, 0.15, 1)';
        strip.style.transform = `translateY(-${move}px)`;

        // 停止時的音效
        setTimeout(() => AudioEngine.playStop(), 2000);
        setTimeout(() => checkFinished(), 2200);
    }

    function checkFinished() {
        if (isProcessingResult || results.some(r => r === null)) return;
        
        isProcessingResult = true;
        AudioEngine.playWin(); // 播放贏得大獎音效

        const finalVal = results.join('');
        document.getElementById('amount').innerText = Number(finalVal).toLocaleString();
        document.getElementById('resultArea').classList.remove('hidden');
        masterBtn.style.display = 'none';
        
        addHistory(finalVal);

        const end = Date.now() + 3000;
        (function frame() {
            confetti({ particleCount: 3, angle: 60, spread: 60, origin: { x: 0 }, colors: ['#ff4757', '#ffd700'] });
            confetti({ particleCount: 3, angle: 120, spread: 60, origin: { x: 1 }, colors: ['#ff4757', '#ffd700'] });
            if (Date.now() < end) requestAnimationFrame(frame);
        }());
    }

    function addHistory(val) {
        const now = new Date();
        const timeStr = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
        const record = {
            time: timeStr,
            name: config.name,
            topic: config.topic,
            amount: Number(val).toLocaleString(),
            unit: config.unit
        };
        historyData.unshift(record);
        renderHistory();
    }

    function renderHistory() {
        if (historyData.length === 0) {
            historyList.innerHTML = '<p class="text-center text-gray-400 text-xs py-4">目前尚無紀錄</p>';
            return;
        }
        historyList.innerHTML = historyData.map(item => `
            <div class="history-item">
                <div class="flex flex-col">
                    <span class="text-[10px] text-gray-400">${item.time}</span>
                    <span class="font-bold text-gray-600">${item.name} (${item.topic})</span>
                </div>
                <div class="text-pink-500 font-black">
                    $${item.amount} ${item.unit}
                </div>
            </div>
        `).join('');
    }

    function handleClearHistory() {
        if (!clearConfirmMode) {
            clearConfirmMode = true;
            clearBtn.innerText = "確定清空？";
            clearBtn.classList.remove('text-gray-400', 'bg-gray-100');
            clearBtn.classList.add('text-white', 'bg-red-500');
            setTimeout(() => resetClearBtn(), 3000);
        } else {
            historyData = [];
            renderHistory();
            resetClearBtn();
        }
    }

    function resetClearBtn() {
        clearConfirmMode = false;
        clearBtn.innerText = "清空紀錄";
        clearBtn.classList.add('text-gray-400', 'bg-gray-100');
        clearBtn.classList.remove('text-white', 'bg-red-500');
    }

    function resetToSetup() {
        gameView.classList.add('hidden');
        setupView.classList.remove('hidden');
    }
    
    updateVipVisibility();
</script>

</body>
</html>
