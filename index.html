<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生日限定拉霸抽現金</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap');

        body {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Microsoft JhengHei', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        .slot-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 2rem;
            border-radius: 2rem;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            border: 8px solid #ffdde1;
            text-align: center;
            width: 95%;
            max-width: 600px;
        }

        .slot-machine-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            background: #333;
            padding: 1rem;
            border-radius: 1rem;
            margin: 1.5rem 0;
            border: 4px solid #ffd700;
        }

        .reel {
            height: 80px;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }

        .number-strip {
            position: absolute;
            width: 100%;
            display: flex;
            flex-direction: column;
            transform: translateY(0);
        }

        .digit {
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: bold;
            color: #ff4757;
        }

        .btn-individual {
            background: #ff4757;
            color: white;
            width: 100%;
            padding: 8px 0;
            margin-top: 10px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.8rem;
            cursor: pointer;
            border: none;
            box-shadow: 0 4px 0 #c0392b;
        }

        .btn-individual:active { transform: translateY(2px); box-shadow: 0 2px 0 #c0392b; }
        .btn-individual:disabled { background: #ccc; box-shadow: 0 4px 0 #999; cursor: not-allowed; }

        .title { font-family: 'ZCOOL KuaiLe', cursive; color: #ff4757; font-size: 2rem; }
        
        .result-text {
            animation: bounceIn 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); opacity: 1; }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

<div class="slot-container">
    <div class="title">生日幸運拉霸 ❤</div>
    <p class="text-gray-600">映潔，抽個破萬大紅包吧！</p>
    
    <div class="slot-machine-grid">
        <!-- 萬位 -->
        <div class="flex flex-col">
            <div class="reel"><div class="number-strip" id="strip-0"></div></div>
            <button class="btn-individual" id="btn-0" onclick="spinDigit(0, 1)">萬位</button>
        </div>
        <!-- 千位 -->
        <div class="flex flex-col">
            <div class="reel"><div class="number-strip" id="strip-1"></div></div>
            <button class="btn-individual" id="btn-1" onclick="spinDigit(1)">千位</button>
        </div>
        <!-- 百位 -->
        <div class="flex flex-col">
            <div class="reel"><div class="number-strip" id="strip-2"></div></div>
            <button class="btn-individual" id="btn-2" onclick="spinDigit(2)">百位</button>
        </div>
        <!-- 十位 -->
        <div class="flex flex-col">
            <div class="reel"><div class="number-strip" id="strip-3"></div></div>
            <button class="btn-individual" id="btn-3" onclick="spinDigit(3)">十位</button>
        </div>
        <!-- 個位 -->
        <div class="flex flex-col">
            <div class="reel"><div class="number-strip" id="strip-4"></div></div>
            <button class="btn-individual" id="btn-4" onclick="spinDigit(4)">個位</button>
        </div>
    </div>

    <div id="result" class="hidden mt-4 result-text">
        <div class="text-2xl font-bold text-pink-600 mb-2">
            🎉 恭喜映潔獲得現金：$<span id="amount">0</span> 元！ 🎉
        </div>
        <div class="text-3xl font-extrabold text-red-500 tracking-widest">
            🎂 生日快樂 🎂
        </div>
    </div>

    <button onclick="location.reload()" class="mt-6 text-gray-400 underline text-sm">重新開始</button>
</div>

<script>
    const strips = [0,1,2,3,4].map(i => document.getElementById(`strip-${i}`));
    const buttons = [0,1,2,3,4].map(i => document.getElementById(`btn-${i}`));
    const results = [null, null, null, null, null];
    const DIGIT_HEIGHT = 80;
    
    function init() {
        strips.forEach(strip => {
            strip.innerHTML = '';
            // 使用較大的重複次數確保長度充足
            for(let i=0; i<80; i++) { 
                for(let j=0; j<=9; j++) {
                    const d = document.createElement('div');
                    d.className = 'digit'; d.innerText = j;
                    strip.appendChild(d);
                }
            }
        });
    }
    init();

    function spinDigit(idx, fixedValue = null) {
        if(results[idx] !== null) return;
        buttons[idx].disabled = true;
        
        const target = (fixedValue !== null) ? fixedValue : Math.floor(Math.random() * 10);
        results[idx] = target;
        
        // 確保個位數與其他位數滾動距離一致且準確
        const baseRounds = 40; 
        const extraRounds = idx * 3;
        const totalTarget = (baseRounds + extraRounds) * 10 + target;
        const move = totalTarget * DIGIT_HEIGHT;
        
        strips[idx].style.transition = 'transform 2.5s cubic-bezier(0.15, 0, 0.15, 1)';
        strips[idx].style.transform = `translateY(-${move}px)`;

        setTimeout(() => {
            checkFinished();
        }, 2600);
    }

    function checkFinished() {
        if(results.every(r => r !== null)) {
            const rawAmount = results.join('');
            document.getElementById('amount').innerText = Number(rawAmount).toLocaleString();
            document.getElementById('result').classList.remove('hidden');
            
            // 全螢幕噴發慶祝
            const end = Date.now() + 4 * 1000;
            (function frame() {
              confetti({ particleCount: 4, angle: 60, spread: 60, origin: { x: 0 }, colors: ['#ff4757', '#ffd700', '#ff9a9e'] });
              confetti({ particleCount: 4, angle: 120, spread: 60, origin: { x: 1 }, colors: ['#ff4757', '#ffd700', '#ff9a9e'] });
              if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }
    }
</script>
</body>
</html>
